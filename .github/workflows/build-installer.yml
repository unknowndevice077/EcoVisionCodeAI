name: Build EcoVision Sentinel Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: true   # needed if weights/*.pt is tracked via Git LFS

      # windows-latest runners only have ~14GB free by default. A CUDA
      # torch/torchvision + openvino + ultralytics + roboflow venv, plus a
      # full node_modules + Electron binary, plus the pip/npm caches, can
      # blow past that -- and when the disk fills up mid-write, the NSIS
      # 7z archive gets truncated, which is exactly what "failed creating
      # mmap" means (it's not a permissions/signing error, it's a corrupt
      # file). Free up known-safe space before the heavy steps.
      - name: Free up disk space
        shell: powershell
        run: |
          Write-Host "Disk space BEFORE cleanup:"
          Get-PSDrive -PSProvider FileSystem | Format-Table -AutoSize
          Remove-Item -Recurse -Force "C:\Program Files\dotnet" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\hostedtoolcache\windows\Ruby" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "${env:ANDROID_HOME}" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files (x86)\Android" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\Microsoft SQL Server" -ErrorAction SilentlyContinue
          Write-Host "Disk space AFTER cleanup:"
          Get-PSDrive -PSProvider FileSystem | Format-Table -AutoSize

      # ---------------------------------------------------------------
      # 1. PYTHON SIDE -- build a real venv that gets shipped as-is
      #    (this matches your package.json's extraFiles: ".venv/**/*")
      # ---------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Caches pip's DOWNLOAD cache (the .whl files themselves), not the venv
      # folder -- the venv still gets created fresh every run (has to, it
      # bakes in absolute paths tied to that specific runner), but pip skips
      # re-downloading anything whose wheel is already sitting in this cache.
      # Key includes requirements.txt's hash, so a real dependency change
      # still busts the cache and re-downloads; an unrelated code change (or
      # a new tag with the same requirements.txt) reuses it.
      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Create venv and install dependencies
        run: |
          python -m venv .venv
          .venv\Scripts\pip install --upgrade pip
          # Uses requirements.ci.txt (trimmed) instead of requirements.txt --
          # your local requirements.txt stays untouched for dev work, this
          # file is what actually ships inside the bundled .venv. Re-run
          # audit_requirements.py after adding new imports and update
          # requirements.ci.txt to match, or the build will be missing a
          # package it now actually needs.
          #
          # torch==...+cu130 (and torchvision pinned the same way) is a CUDA
          # build hosted on PyTorch's own index, not PyPI -- pip needs
          # --extra-index-url or it 404s no matter how many times you rerun
          # it. Adjust /cu130 if your pin uses a different CUDA version.
          .venv\Scripts\pip install -r requirements.ci.txt --extra-index-url https://download.pytorch.org/whl/cu130

      - name: Check disk space after venv install
        shell: powershell
        run: Get-PSDrive -PSProvider FileSystem | Format-Table -AutoSize

      # ---------------------------------------------------------------
      # 2. FRONTEND SIDE -- Next.js production build (served via `next start`
      #    inside Electron, not a static export -- see electron/main.js)
      # ---------------------------------------------------------------
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"   # caches ~/.npm keyed on package-lock.json automatically

      - name: Install Node dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build   # emits .next/

      - name: Check disk space before packaging
        shell: powershell
        run: Get-PSDrive -PSProvider FileSystem | Format-Table -AutoSize

      # ---------------------------------------------------------------
      # 3. ELECTRON -- package .next, node_modules, .venv, maincode,
      #    weights, and config.json into one NSIS installer
      # ---------------------------------------------------------------
      - name: Build Windows installer
        run: npm run app:build   # next build && electron-builder (build already ran above, safe to rerun)

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: EcoVisionSentinel-Setup
          path: dist/*.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}