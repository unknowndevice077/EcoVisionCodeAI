name: Build EcoVision Sentinel Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows-installer:
    runs-on: windows-latest
    if: github.repository_owner == 'unknowndevice077' && (github.actor == 'unknowndevice077' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: true   # needed if weights/*.pt is tracked via Git LFS

      # windows-latest runners only have ~14GB free by default. A CUDA
      # torch/torchvision + openvino + ultralytics + roboflow venv, plus a
      # full node_modules + Electron binary, plus the pip/npm caches, can
      # blow past that -- and when the disk fills up mid-write, the NSIS
      # 7z archive gets truncated, which is exactly what "failed creating
      # mmap" means (it's not a permissions/signing error, it's a corrupt
      # file). Free up as much known-safe space as possible before the heavy steps.
      - name: Free up disk space aggressively
        shell: powershell
        run: |
          Write-Host "=== Disk space BEFORE cleanup ==="
          Get-PSDrive -PSProvider FileSystem | Format-Table -AutoSize

          # --- .NET SDKs (largest savings) ---
          Remove-Item -Recurse -Force "C:\Program Files\dotnet" -ErrorAction SilentlyContinue

          # --- Browser caches/tools ---
          Remove-Item -Recurse -Force "C:\hostedtoolcache\windows\Ruby" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\hostedtoolcache\windows\Python" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\hostedtoolcache\windows\Java" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\hostedtoolcache\windows\Go" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "${env:ANDROID_HOME}" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files (x86)\Android" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\Microsoft SQL Server" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\IDE\Extensions" -ErrorAction SilentlyContinue

          # --- npm/yarn caches ---
          Remove-Item -Recurse -Force "${env:APPDATA}\npm-cache" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "${env:LOCALAPPDATA}\npm-cache" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "${env:LOCALAPPDATA}\pnpm" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "${env:LOCALAPPDATA}\Yarn" -ErrorAction SilentlyContinue

          # --- Windows temp ---
          Remove-Item -Recurse -Force "C:\Windows\Temp\*" -ErrorAction SilentlyContinue

          Write-Host "=== Disk space AFTER cleanup ==="
          Get-PSDrive -PSProvider FileSystem | Format-Table -AutoSize

      # ---------------------------------------------------------------
      # 1. PYTHON SIDE -- build a real venv that gets shipped as-is
      #    (this matches your package.json's extraFiles: ".venv/**/*")
      # ---------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Create venv and install dependencies
        run: |
          python -m venv .venv
          .venv\Scripts\pip install --upgrade pip
          .venv\Scripts\pip install -r requirements.ci.txt --extra-index-url https://download.pytorch.org/whl/cu130

      - name: Prune .venv to minimum size
        shell: powershell
        run: |
          Write-Host "=== .venv size BEFORE pruning ==="
          $sizeBefore = (Get-ChildItem ".venv" -Recurse -File | Measure-Object -Property Length -Sum).Sum / 1GB
          Write-Host "$([math]::Round($sizeBefore, 2)) GB"

          Remove-Item -Recurse -Force ".venv\Lib\site-packages\pip*" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force ".venv\Scripts\pip*" -ErrorAction SilentlyContinue

          Get-ChildItem ".venv" -Directory -Filter "__pycache__" -Recurse | Remove-Item -Recurse -Force
          Get-ChildItem ".venv" -Filter "*.pyc" -Recurse | Remove-Item -Force
          Get-ChildItem ".venv" -Directory -Filter "tests" -Recurse | Remove-Item -Recurse -Force
          Get-ChildItem ".venv" -Directory -Filter "test" -Recurse | Remove-Item -Recurse -Force
          Get-ChildItem ".venv" -Directory -Filter "docs" -Recurse | Remove-Item -Recurse -Force
          Get-ChildItem ".venv" -Directory -Filter "doc" -Recurse | Remove-Item -Recurse -Force
          Get-ChildItem ".venv" -Directory -Filter "examples" -Recurse | Remove-Item -Recurse -Force
          Get-ChildItem ".venv" -Filter "*.whl" -Recurse | Remove-Item -Force

          Remove-Item -Recurse -Force ".venv\Lib\site-packages\torch\include" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force ".venv\Lib\site-packages\torch\share" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force ".venv\Lib\site-packages\torch\lib\*.h" -ErrorAction SilentlyContinue
          Get-ChildItem ".venv\Lib\site-packages" -Directory -Filter "nvcc" -Recurse | Remove-Item -Recurse -Force

          Write-Host "=== .venv size AFTER pruning ==="
          $sizeAfter = (Get-ChildItem ".venv" -Recurse -File | Measure-Object -Property Length -Sum).Sum / 1GB
          Write-Host "$([math]::Round($sizeAfter, 2)) GB"

      - name: Check disk space after venv install
        shell: powershell
        run: |
          Remove-Item -Recurse -Force "$env:LOCALAPPDATA\pip\Cache" -ErrorAction SilentlyContinue
          Get-PSDrive -PSProvider FileSystem | Format-Table -AutoSize

      # ---------------------------------------------------------------
      # 2. FRONTEND SIDE
      # ---------------------------------------------------------------
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Check disk space before packaging
        shell: powershell
        run: Get-PSDrive -PSProvider FileSystem | Format-Table -AutoSize

      - name: Prune node_modules for packaging
        shell: powershell
        run: |
          Write-Host "=== node_modules size BEFORE pruning ==="
          $sizeBefore = (Get-ChildItem "node_modules" -Recurse -File -ErrorAction SilentlyContinue | Measure-Object -Property Length -Sum).Sum / 1GB
          Write-Host "$([math]::Round($sizeBefore, 2)) GB"

          Get-ChildItem "node_modules" -Directory -Filter "docs" -Recurse -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force
          Get-ChildItem "node_modules" -Directory -Filter "doc" -Recurse -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force
          Get-ChildItem "node_modules" -Directory -Filter "test" -Recurse -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force
          Get-ChildItem "node_modules" -Directory -Filter "tests" -Recurse -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force
          Get-ChildItem "node_modules" -Directory -Filter "__pycache__" -Recurse -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force
          Get-ChildItem "node_modules" -Directory -Filter "example" -Recurse -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force
          Get-ChildItem "node_modules" -Directory -Filter "examples" -Recurse -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force

          Write-Host "=== node_modules size AFTER pruning ==="
          $sizeAfter = (Get-ChildItem "node_modules" -Recurse -File -ErrorAction SilentlyContinue | Measure-Object -Property Length -Sum).Sum / 1GB
          Write-Host "$([math]::Round($sizeAfter, 2)) GB"

      # ---------------------------------------------------------------
      # 3. ELECTRON -- package into a portable win-unpacked folder
      # ---------------------------------------------------------------
      - name: Package Electron app (portable)
        run: npx electron-builder --win --dir

      # ---------------------------------------------------------------
      # 4. COMPRESS
      # ---------------------------------------------------------------
      - name: Compress build into zip archive
        shell: powershell
        run: |
          Write-Host "=== Compressing win-unpacked into zip ==="
          Compress-Archive -Path "dist\win-unpacked\*" -DestinationPath "dist\EcoVisionSentinel-2.0.0-win64.zip" -CompressionLevel Optimal
          $zipSize = (Get-Item "dist\EcoVisionSentinel-2.0.0-win64.zip").Length / 1GB
          Write-Host "Zip size: $([math]::Round($zipSize, 2)) GB"

      # ---------------------------------------------------------------
      # 5. ARTIFACT ONLY -- no auto-release. Download the zip from this
      #    run's Artifacts tab and create/attach the GitHub Release
      #    yourself, on your own schedule, with your own notes.
      # ---------------------------------------------------------------
      - name: Upload portable build artifact
        uses: actions/upload-artifact@v4
        with:
          name: EcoVisionSentinel-Portable
          path: dist/EcoVisionSentinel-*.zip